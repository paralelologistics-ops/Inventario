<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Inventarios y Precios PARALELO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root {
            --bg-color: #fdfdfd;
            --text-color: #2c2c2c;
            --accent-color: #d4a373;
            --dark-color: #1a1a1a;
            --light-gray: #f4f4f4;
            --border-radius: 12px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 30px 20px 10px 20px;
            width: 100%;
        }

        .logo-container img {
            height: 60px;
            margin-bottom: 10px;
            filter: grayscale(100%);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            color: var(--dark-color);
        }

        /* --- SISTEMA DE PESTAÑAS --- */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            width: 90%;
            max-width: 1100px;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            border: none;
            background: #eee;
            font-family: 'Montserrat';
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            transition: all 0.3s;
            color: #888;
        }

        .tab-button.active {
            background: white;
            color: var(--dark-color);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            border-bottom: 3px solid var(--accent-color);
        }

        /* --- CONTENIDO --- */
        main {
            width: 95%;
            max-width: 1100px;
            background: white;
            padding: 30px;
            border-radius: 0 0 var(--border-radius) var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 40px;
            min-height: 300px;
        }

        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- FORMULARIOS --- */
        .search-grid {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 30px;
            background: #fafafa;
            padding: 20px;
            border-radius: 8px;
        }

        @media (max-width: 768px) { .search-grid { grid-template-columns: 1fr; } }

        .input-group { display: flex; flex-direction: column; }
        label { font-family: 'Montserrat'; font-weight: 600; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 5px; color: #888; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Poppins'; }

        .btn-search {
            background-color: var(--dark-color);
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 6px;
            font-family: 'Montserrat';
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-search:hover { background-color: var(--accent-color); }

        /* --- PRECIO CARD --- */
        .price-display {
            text-align: center;
            padding: 40px;
            border: 2px dashed #eee;
            border-radius: 12px;
            margin-top: 20px;
        }

        .price-value {
            font-size: 3.5rem;
            font-family: 'Montserrat';
            font-weight: 700;
            color: var(--dark-color);
            margin: 10px 0;
        }

        .price-label { font-family: 'Montserrat'; color: var(--accent-color); letter-spacing: 2px; text-transform: uppercase; }

        /* --- TABLAS --- */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f8f8; color: #999; font-size: 0.7rem; padding: 12px; text-transform: uppercase; text-align: center; border-bottom: 2px solid #eee; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }
        .has-stock { font-weight: 600; }
        .no-stock { color: #ddd; }

        .instructions { font-size: 0.8rem; color: #777; margin-bottom: 20px; border-left: 3px solid var(--accent-color); padding-left: 15px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container"><img src="https://static.wixstatic.com/media/d0ce54_32d30a8159fd44d4a26c62563d7bfc38~mv2.jpg"></div>
        <h1>Consulta de Inventarios y Precios PARALELO</h1>
    </header>

    <div class="tabs-container">
        <button class="tab-button active" onclick="openTab('inventory')">📦 Inventarios</button>
        <button class="tab-button" onclick="openTab('prices')">💰 Precios</button>
    </div>

    <main>
        <div id="loader" style="text-align:center; padding: 40px;">Sincronizando datos...</div>

        <div id="appContainer" style="display:none">
            
            <section id="inventory" class="content-section active">
                <div class="instructions">
                    <b>Consulta de Stock:</b> Selecciona referencia y talla para ver disponibilidad en sedes.
                </div>
                <div class="search-grid">
                    <div class="input-group">
                        <label>Referencia</label>
                        <input type="text" class="refInput" list="refList" placeholder="Ej: AKIRA PANT">
                    </div>
                    <div class="input-group">
                        <label>Talla</label>
                        <select class="sizeSelect"><option value="">Selecciona...</option></select>
                    </div>
                    <button class="btn-search" onclick="searchStock()">Consultar Stock</button>
                </div>
                <div id="inventoryResult"></div>
            </section>

            <section id="prices" class="content-section">
                <div class="instructions">
                    <b>Consulta de Precios:</b> Obtén el precio oficial de venta para la referencia seleccionada.
                </div>
                <div class="search-grid">
                    <div class="input-group" style="grid-column: span 2;">
                        <label>Referencia del Producto</label>
                        <input type="text" class="refInput" list="refList" placeholder="Escribe o escoge el nombre del producto...">
                    </div>
                    <button class="btn-search" onclick="searchPrice()">Ver Precio</button>
                </div>
                <div id="priceResult"></div>
            </section>

        </div>
    </main>

    <datalist id="refList"></datalist>

    <script>
        const SHEETS = {
            'Referencias': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=491957809&single=true&output=csv',
            'Amorella': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1065082332&single=true&output=csv',
            'Emprenditoria': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1743770835&single=true&output=csv',
            'ID Design': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1231428952&single=true&output=csv',
            'Ginebra': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=557549372&single=true&output=csv',
            'Benditta': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=0&single=true&output=csv',
            'Taller': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=753428539&single=true&output=csv',
            'Natalia': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1564348751&single=true&output=csv',
            'Manuela': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1147281710&single=true&output=csv'
        };

        const LOCATIONS = Object.keys(SHEETS).filter(k => k !== 'Referencias');
        let inventory = {};
        let pricesMap = {};

        async function init() {
            const promises = Object.entries(SHEETS).map(([name, url]) => {
                return new Promise(resolve => {
                    Papa.parse(url, {
                        download: true, header: true,
                        complete: res => resolve({name, data: res.data}),
                        error: () => resolve({name, data: []})
                    });
                });
            });

            const results = await Promise.all(promises);
            results.forEach(res => process(res.name, res.data));
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            fillRefs();
        }

        function process(name, rows) {
            rows.forEach(row => {
                const ref = row['Referencia']?.trim();
                const size = row['Talla']?.trim();
                if(!ref) return;

                if(name === 'Referencias') {
                    if(!inventory[ref]) inventory[ref] = {};
                    if(size && !inventory[ref][size]) {
                        inventory[ref][size] = {};
                        LOCATIONS.forEach(l => inventory[ref][size][l] = 0);
                    }
                    // Guardar precio
                    if(row['Precio Nuevo Paralelo y Multimarcas']) {
                        pricesMap[ref] = row['Precio Nuevo Paralelo y Multimarcas'];
                    }
                } else if(size) {
                    if(!inventory[ref]) inventory[ref] = {};
                    if(!inventory[ref][size]) {
                        inventory[ref][size] = {};
                        LOCATIONS.forEach(l => inventory[ref][size][l] = 0);
                    }
                    let qty = parseInt(String(row['Saldo actual']).replace(/[^0-9]/g, '')) || 0;
                    inventory[ref][size][name] = qty;
                }
            });
        }

        function fillRefs() {
            const list = document.getElementById('refList');
            Object.keys(pricesMap).sort().forEach(r => {
                const opt = document.createElement('option');
                opt.value = r; list.appendChild(opt);
            });
        }

        // Sincronizar inputs de referencia entre pestañas
        document.querySelectorAll('.refInput').forEach(input => {
            input.addEventListener('input', e => {
                const val = e.target.value;
                document.querySelectorAll('.refInput').forEach(i => i.value = val);
                updateSizes(val);
            });
        });

        function updateSizes(ref) {
            const sel = document.querySelector('.sizeSelect');
            if(inventory[ref]) {
                sel.innerHTML = '<option value="ALL">Todas las tallas</option>';
                Object.keys(inventory[ref]).sort().forEach(s => {
                    sel.innerHTML += `<option value="${s}">${s}</option>`;
                });
            } else {
                sel.innerHTML = '<option value="">Selecciona...</option>';
            }
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function searchStock() {
            const ref = document.querySelector('#inventory .refInput').value;
            const size = document.querySelector('.sizeSelect').value;
            const container = document.getElementById('inventoryResult');

            if(!inventory[ref]) {
                container.innerHTML = "<p style='color:red; text-align:center;'>Referencia no encontrada.</p>";
                return;
            }

            let html = `<table><thead><tr><th>Talla</th>${LOCATIONS.map(l=>`<th>${l}</th>`).join('')}</tr></thead><tbody>`;
            const sizes = size === 'ALL' ? Object.keys(inventory[ref]).sort() : [size];
            
            sizes.forEach(s => {
                html += `<tr><td style="font-weight:700">${s}</td>`;
                LOCATIONS.forEach(loc => {
                    const q = inventory[ref][s][loc];
                    html += `<td class="${q>0?'has-stock':'no-stock'}">${q>0?q:'-'}</td>`;
                });
                html += `</tr>`;
            });
            container.innerHTML = html + "</tbody></table>";
        }

        function searchPrice() {
            const ref = document.querySelector('#prices .refInput').value;
            const container = document.getElementById('priceResult');

            if(pricesMap[ref]) {
                container.innerHTML = `
                    <div class="price-display">
                        <div class="price-label">Precio de Venta Público</div>
                        <div class="price-value">${pricesMap[ref]}</div>
                        <div style="color:#999; font-size:0.8rem;">Referencia: ${ref}</div>
                    </div>
                `;
            } else {
                container.innerHTML = "<p style='color:red; text-align:center; padding:20px;'>Referencia no encontrada o no tiene precio asignado.</p>";
            }
        }

        init();
    </script>
</body>
</html>
