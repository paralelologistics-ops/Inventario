<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Inventarios y Precios PARALELO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root {
            --bg-color: #fdfdfd;
            --text-color: #2c2c2c;
            --accent-color: #d4a373;
            --dark-color: #1a1a1a;
            --light-gray: #f4f4f4;
            --border-radius: 12px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header { text-align: center; padding: 30px 20px 10px 20px; width: 100%; }
        .logo-container img { height: 60px; margin-bottom: 10px; filter: grayscale(100%); }
        h1 { font-family: 'Montserrat'; font-weight: 700; font-size: 1.6rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }

        /* --- PESTAÑAS --- */
        .tabs-container { display: flex; gap: 10px; margin: 20px 0; width: 90%; max-width: 1100px; }
        .tab-button { flex: 1; padding: 15px; border: none; background: #eee; font-family: 'Montserrat'; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; cursor: pointer; border-radius: 8px 8px 0 0; transition: 0.3s; color: #888; }
        .tab-button.active { background: white; color: var(--dark-color); border-bottom: 3px solid var(--accent-color); }

        main { width: 95%; max-width: 1100px; background: white; padding: 30px; border-radius: 0 0 var(--border-radius) var(--border-radius); box-shadow: var(--shadow); margin-bottom: 40px; min-height: 400px; }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* --- BUSCADOR --- */
        .search-grid {
            display: grid;
            grid-template-columns: 2fr 1fr auto auto;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 30px;
            background: #fafafa;
            padding: 20px;
            border-radius: 8px;
        }

        @media (max-width: 768px) { .search-grid { grid-template-columns: 1fr; } }

        .input-group { display: flex; flex-direction: column; }
        label { font-family: 'Montserrat'; font-weight: 600; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 5px; color: #888; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Poppins'; width: 100%; box-sizing: border-box; }

        .btn-search { background-color: var(--dark-color); color: white; padding: 14px 25px; border: none; border-radius: 6px; font-family: 'Montserrat'; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-search:hover { background-color: var(--accent-color); }

        .btn-clear { background-color: #e0e0e0; color: #666; padding: 14px 20px; border: none; border-radius: 6px; font-family: 'Montserrat'; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-clear:hover { background-color: #d0d0d0; color: #333; }

        /* --- RESULTADOS --- */
        .price-display { text-align: center; padding: 40px; border: 2px dashed #eee; border-radius: 12px; margin-top: 20px; animation: slideUp 0.3s ease; }
        .price-value { font-size: 3.5rem; font-family: 'Montserrat'; font-weight: 700; color: var(--dark-color); margin: 10px 0; }
        .price-label { font-family: 'Montserrat'; color: var(--accent-color); letter-spacing: 2px; text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; animation: fadeIn 0.5s ease; }
        th { background: #f8f8f8; color: #999; font-size: 0.7rem; padding: 12px; text-transform: uppercase; border-bottom: 2px solid #eee; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }
        .has-stock { font-weight: 600; color: var(--dark-color); }
        .no-stock { color: #ddd; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .instructions { font-size: 0.8rem; color: #777; margin-bottom: 20px; border-left: 3px solid var(--accent-color); padding-left: 15px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container"><img src="https://static.wixstatic.com/media/d0ce54_32d30a8159fd44d4a26c62563d7bfc38~mv2.jpg"></div>
        <h1>Consulta de Inventarios y Precios PARALELO</h1>
    </header>

    <div class="tabs-container">
        <button class="tab-button active" id="btn-tab-inv" onclick="openTab('inventory')">📦 Inventarios</button>
        <button class="tab-button" id="btn-tab-pri" onclick="openTab('prices')">💰 Precios</button>
    </div>

    <main>
        <div id="loader" style="text-align:center; padding: 40px; font-weight: 600; color: var(--accent-color);">
            Sincronizando todas las referencias...<br>
            <span style="font-size:0.8rem; color:#999; font-weight:400">(Esto puede tomar unos segundos)</span>
        </div>

        <div id="appContainer" style="display:none">
            
            <section id="inventory" class="content-section active">
                <div class="instructions"><b>Stock por Sede:</b> Selecciona producto y talla para ver existencias.</div>
                <div class="search-grid">
                    <div class="input-group">
                        <label>Referencia</label>
                        <input type="text" id="invRefInput" list="refList" placeholder="Escribe para buscar..." oninput="syncInputs(this.value)">
                    </div>
                    <div class="input-group">
                        <label>Talla</label>
                        <select id="invSizeSelect"><option value="">Selecciona producto...</option></select>
                    </div>
                    <button class="btn-search" onclick="searchStock()">Buscar</button>
                    <button class="btn-clear" onclick="clearAll()">Limpiar</button>
                </div>
                <div id="inventoryResult"></div>
            </section>

            <section id="prices" class="content-section">
                <div class="instructions"><b>Precios de Venta:</b> Consulta el precio oficial PVP.</div>
                <div class="search-grid" style="grid-template-columns: 3fr auto auto;">
                    <div class="input-group">
                        <label>Referencia del Producto</label>
                        <input type="text" id="priRefInput" list="refList" placeholder="Escribe para buscar..." oninput="syncInputs(this.value)">
                    </div>
                    <button class="btn-search" onclick="searchPrice()">Ver Precio</button>
                    <button class="btn-clear" onclick="clearAll()">Limpiar</button>
                </div>
                <div id="priceResult"></div>
            </section>

        </div>
    </main>

    <datalist id="refList"></datalist>

    <script>
        const SHEETS = {
            'Referencias': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=491957809&single=true&output=csv',
            'Amorella': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1065082332&single=true&output=csv',
            'Emprenditoria': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1743770835&single=true&output=csv',
            'ID Design': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1231428952&single=true&output=csv',
            'Ginebra': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=557549372&single=true&output=csv',
            'Benditta': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=0&single=true&output=csv',
            'Taller': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=753428539&single=true&output=csv',
            'Natalia': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1564348751&single=true&output=csv',
            'Manuela': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1147281710&single=true&output=csv'
        };

        const LOCATIONS = Object.keys(SHEETS).filter(k => k !== 'Referencias');
        let inventory = {};
        let pricesMap = {};
        let allUniqueRefs = new Set(); // Colección global de referencias únicas

        async function init() {
            const promises = Object.entries(SHEETS).map(([name, url]) => {
                return new Promise(resolve => {
                    Papa.parse(url, {
                        download: true, header: true, skipEmptyLines: true,
                        complete: res => resolve({name, data: res.data}),
                        error: () => resolve({name, data: []})
                    });
                });
            });

            const results = await Promise.all(promises);
            results.forEach(res => process(res.name, res.data));
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            fillRefs();
        }

        function process(name, rows) {
            rows.forEach(row => {
                // Validación estricta para asegurar que leemos todo
                const ref = row['Referencia'] ? row['Referencia'].trim() : null;
                const size = row['Talla'] ? row['Talla'].trim() : null;
                
                // Si no hay nombre de referencia, saltamos esta fila
                if(!ref || ref === "") return; 

                // Agregar a la lista global (sin importar de qué hoja venga)
                allUniqueRefs.add(ref);

                // Lógica de Precios (Solo hoja Referencias)
                if(name === 'Referencias' && row['Precio Nuevo Paralelo y Multimarcas']) {
                    pricesMap[ref] = row['Precio Nuevo Paralelo y Multimarcas'];
                }

                // Lógica de Inventario
                if(!inventory[ref]) inventory[ref] = {};
                
                if(size) {
                    if(!inventory[ref][size]) {
                        inventory[ref][size] = {};
                        LOCATIONS.forEach(l => inventory[ref][size][l] = 0);
                    }
                    // Si no es la hoja de referencias, asumimos que es una tienda
                    if(name !== 'Referencias') {
                        let qty = parseInt(String(row['Saldo actual']).replace(/[^0-9]/g, '')) || 0;
                        inventory[ref][size][name] = qty;
                    }
                }
            });
        }

        function fillRefs() {
            const list = document.getElementById('refList');
            list.innerHTML = "";
            // Convertimos el Set a Array y ordenamos alfabéticamente
            const sortedRefs = Array.from(allUniqueRefs).sort((a, b) => a.localeCompare(b));
            
            sortedRefs.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r; 
                list.appendChild(opt);
            });
        }

        function syncInputs(val) {
            document.getElementById('invRefInput').value = val;
            document.getElementById('priRefInput').value = val;
            updateSizes(val);
        }

        function updateSizes(ref) {
            const sel = document.getElementById('invSizeSelect');
            if(inventory[ref]) {
                const sizes = Object.keys(inventory[ref]).sort();
                sel.innerHTML = '<option value="ALL">Todas las tallas</option>';
                sizes.forEach(s => {
                    sel.innerHTML += `<option value="${s}">${s}</option>`;
                });
            } else {
                sel.innerHTML = '<option value="">Selecciona producto...</option>';
            }
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            if(tabId === 'inventory') document.getElementById('btn-tab-inv').classList.add('active');
            else document.getElementById('btn-tab-pri').classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function clearAll() {
            document.getElementById('invRefInput').value = "";
            document.getElementById('priRefInput').value = "";
            document.getElementById('invSizeSelect').innerHTML = '<option value="">Selecciona producto...</option>';
            document.getElementById('inventoryResult').innerHTML = "";
            document.getElementById('priceResult').innerHTML = "";
        }

        function searchStock() {
            const ref = document.getElementById('invRefInput').value;
            const size = document.getElementById('invSizeSelect').value;
            const container = document.getElementById('inventoryResult');

            if(!inventory[ref]) {
                container.innerHTML = "<p style='color:red; text-align:center; padding: 20px;'>Producto no encontrado o nombre incorrecto.</p>";
                return;
            }

            let html = `<table><thead><tr><th>Talla</th>${LOCATIONS.map(l=>`<th>${l}</th>`).join('')}</tr></thead><tbody>`;
            const sizes = size === 'ALL' || size === "" ? Object.keys(inventory[ref]).sort() : [size];
            
            sizes.forEach(s => {
                html += `<tr><td style="font-weight:700">${s}</td>`;
                LOCATIONS.forEach(loc => {
                    const q = inventory[ref][s][loc];
                    html += `<td class="${q>0?'has-stock':'no-stock'}">${q>0?q:'-'}</td>`;
                });
                html += `</tr>`;
            });
            container.innerHTML = html + "</tbody></table>";
        }

        function searchPrice() {
            const ref = document.getElementById('priRefInput').value;
            const container = document.getElementById('priceResult');

            if(pricesMap[ref]) {
                container.innerHTML = `
                    <div class="price-display">
                        <div class="price-label">Precio de Venta Público</div>
                        <div class="price-value">${pricesMap[ref]}</div>
                        <div style="color:#999; font-size:0.8rem;">Ref: ${ref}</div>
                    </div>
                `;
            } else {
                // Si no está en el mapa de precios pero sí en inventario, mostramos aviso
                if(inventory[ref]) {
                     container.innerHTML = `
                        <div class="price-display" style="border-color:#d4a373">
                            <div class="price-value" style="font-size:1.5rem; color:#666">Precio no registrado</div>
                            <div style="color:#999; font-size:0.8rem;">El producto existe en inventario pero no tiene precio asignado en la hoja maestra.</div>
                        </div>
                    `;
                } else {
                    container.innerHTML = "<p style='color:red; text-align:center; padding:20px;'>Referencia no encontrada.</p>";
                }
            }
        }

        init();
    </script>
</body>
</html>
