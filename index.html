<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Inventarios y Precios PARALELO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #333;
            --accent-color: #d4a373;
            --dark-color: #1a1a1a;
            --light-gray: #f4f4f4;
            --border-radius: 8px;
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header { text-align: center; padding: 30px 20px 10px 20px; width: 100%; }
        .logo-container img { height: 65px; margin-bottom: 10px; filter: grayscale(100%); opacity: 0.9; }
        h1 { font-family: 'Montserrat'; font-weight: 700; font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }

        /* --- PESTAÑAS --- */
        .tabs-container { display: flex; gap: 5px; margin: 25px 0; width: 90%; max-width: 1000px; }
        .tab-button { flex: 1; padding: 15px; border: none; background: #e9e9e9; font-family: 'Montserrat'; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; cursor: pointer; border-radius: 6px 6px 0 0; transition: 0.3s; color: #777; }
        .tab-button.active { background: white; color: var(--dark-color); border-bottom: 3px solid var(--accent-color); box-shadow: 0 -4px 10px rgba(0,0,0,0.03); }

        main { width: 95%; max-width: 1000px; background: white; padding: 30px; border-radius: 0 0 var(--border-radius) var(--border-radius); box-shadow: var(--shadow); margin-bottom: 50px; min-height: 450px; position: relative; }
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.3s ease; }

        /* --- GRID DE BÚSQUEDA --- */
        .search-grid {
            display: grid;
            grid-template-columns: 2fr 1fr auto auto;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 25px;
            background: #fafafa;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        @media (max-width: 800px) { .search-grid { grid-template-columns: 1fr; } }

        .input-group { display: flex; flex-direction: column; position: relative; }
        label { font-family: 'Montserrat'; font-weight: 600; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 6px; color: #888; letter-spacing: 0.5px; }
        
        input, select { 
            padding: 12px 15px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-family: 'Poppins'; 
            font-size: 0.95rem; 
            width: 100%; 
            box-sizing: border-box;
            transition: all 0.2s;
        }
        input:focus, select:focus { border-color: var(--accent-color); outline: none; background: #fff; }

        /* --- AUTOCOMPLETE CUSTOMIZADO (SOLUCIÓN T) --- */
        .autocomplete-items {
            position: absolute;
            border: 1px solid #d4d4d4;
            border-bottom: none;
            border-top: none;
            z-index: 99;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 250px;
            overflow-y: auto;
            background-color: white;
            border-radius: 0 0 6px 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: none; /* Oculto por defecto */
        }

        .autocomplete-items div {
            padding: 10px 15px;
            cursor: pointer;
            background-color: #fff;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9rem;
        }

        .autocomplete-items div:hover { background-color: #f9f9f9; color: var(--accent-color); font-weight: 500; }
        .autocomplete-items div strong { color: var(--accent-color); }

        /* --- BOTONES --- */
        .btn-search { background-color: var(--dark-color); color: white; padding: 12px 25px; border: none; border-radius: 6px; font-family: 'Montserrat'; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; height: 45px; }
        .btn-search:hover { background-color: var(--accent-color); transform: translateY(-1px); }
        
        .btn-clear { background-color: #e0e0e0; color: #666; padding: 12px 20px; border: none; border-radius: 6px; font-family: 'Montserrat'; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; height: 45px; }
        .btn-clear:hover { background-color: #d0d0d0; color: #333; }

        /* --- RESULTADOS --- */
        .price-card { 
            text-align: center; 
            padding: 40px; 
            border: 2px dashed #e0e0e0; 
            border-radius: 12px; 
            margin-top: 20px; 
            background: #fff;
        }
        .price-val { font-size: 3rem; font-family: 'Montserrat'; font-weight: 700; color: var(--dark-color); margin: 10px 0; }
        .price-lbl { font-family: 'Montserrat'; color: var(--accent-color); letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th { background: #f4f4f4; color: #777; font-size: 0.75rem; padding: 12px; text-transform: uppercase; border-bottom: 2px solid #ddd; letter-spacing: 0.5px; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #f9f9f9; }
        tr:hover { background-color: #fafafa; }
        
        .has-stock { font-weight: 700; color: var(--dark-color); background-color: rgba(212, 163, 115, 0.1); border-radius: 4px; }
        .no-stock { color: #ccc; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .loader-box { text-align: center; padding: 50px; color: var(--accent-color); }
        .count-badge { background: #eee; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; color: #666; margin-left: 5px; vertical-align: middle; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container"><img src="https://static.wixstatic.com/media/d0ce54_32d30a8159fd44d4a26c62563d7bfc38~mv2.jpg"></div>
        <h1>Consulta de Inventarios y Precios PARALELO</h1>
    </header>

    <div class="tabs-container">
        <button class="tab-button active" id="btn-tab-inv" onclick="openTab('inventory')">📦 Inventarios</button>
        <button class="tab-button" id="btn-tab-pri" onclick="openTab('prices')">💰 Precios</button>
    </div>

    <main>
        <div id="loader" class="loader-box">
            <h3 style="margin:0;">Cargando base de datos...</h3>
            <p style="font-size:0.9rem; color:#999;">Leyendo referencias de todas las sedes.</p>
        </div>

        <div id="appContainer" style="display:none">
            
            <section id="inventory" class="content-section active">
                <div class="search-grid">
                    <div class="input-group">
                        <label>Referencia <span id="countInv" class="count-badge">0 refs</span></label>
                        <input type="text" id="invRefInput" placeholder="Escribe para buscar..." autocomplete="off">
                        <div id="invRefList" class="autocomplete-items"></div>
                    </div>
                    <div class="input-group">
                        <label>Talla</label>
                        <select id="invSizeSelect"><option value="">Selecciona producto...</option></select>
                    </div>
                    <button class="btn-search" onclick="searchStock()">Buscar</button>
                    <button class="btn-clear" onclick="clearAll()">Limpiar</button>
                </div>
                <div id="inventoryResult"></div>
            </section>

            <section id="prices" class="content-section">
                <div class="search-grid" style="grid-template-columns: 3fr auto auto;">
                    <div class="input-group">
                        <label>Referencia del Producto</label>
                        <input type="text" id="priRefInput" placeholder="Escribe para buscar..." autocomplete="off">
                        <div id="priRefList" class="autocomplete-items"></div>
                    </div>
                    <button class="btn-search" onclick="searchPrice()">Ver Precio</button>
                    <button class="btn-clear" onclick="clearAll()">Limpiar</button>
                </div>
                <div id="priceResult"></div>
            </section>

        </div>
    </main>

    <script>
        const SHEETS = {
            'Referencias': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=491957809&single=true&output=csv',
            'Amorella': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1065082332&single=true&output=csv',
            'Emprenditoria': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1743770835&single=true&output=csv',
            'ID Design': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1231428952&single=true&output=csv',
            'Ginebra': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=557549372&single=true&output=csv',
            'Benditta': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=0&single=true&output=csv',
            'Taller': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=753428539&single=true&output=csv',
            'Natalia': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1564348751&single=true&output=csv',
            'Manuela': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo_xmNEQffBWChyZawoj5YNVOhijLLGA-bpBGQHGiTyDeSKV_T-tdW1GQeBjsulx146kbq2V2SPXmN/pub?gid=1147281710&single=true&output=csv'
        };

        const LOCATIONS = Object.keys(SHEETS).filter(k => k !== 'Referencias');
        let inventory = {};
        let pricesMap = {};
        let allRefs = []; // Array simple para búsqueda rápida

        async function init() {
            const promises = Object.entries(SHEETS).map(([name, url]) => {
                return new Promise(resolve => {
                    Papa.parse(url, {
                        download: true, header: true, skipEmptyLines: 'greedy', // Más agresivo con líneas vacías
                        complete: res => resolve({name, data: res.data}),
                        error: () => resolve({name, data: []})
                    });
                });
            });

            const results = await Promise.all(promises);
            let tempRefs = new Set();

            results.forEach(res => {
                res.data.forEach(row => {
                    let ref = row['Referencia'];
                    // Limpieza profunda de la referencia
                    if(ref && typeof ref === 'string') {
                        ref = ref.trim();
                        // Ignorar filas basura que a veces genera Google Sheets
                        if(ref.length > 1 && !ref.match(/^#.*!/)) { 
                            tempRefs.add(ref);
                            
                            // Lógica de Precios
                            if(res.name === 'Referencias' && row['Precio Nuevo Paralelo y Multimarcas']) {
                                pricesMap[ref] = row['Precio Nuevo Paralelo y Multimarcas'];
                            }

                            // Lógica de Inventario
                            const size = row['Talla'] ? row['Talla'].trim() : null;
                            if(size) {
                                if(!inventory[ref]) inventory[ref] = {};
                                if(!inventory[ref][size]) {
                                    inventory[ref][size] = {};
                                    LOCATIONS.forEach(l => inventory[ref][size][l] = 0);
                                }
                                if(res.name !== 'Referencias') {
                                    let qty = parseInt(String(row['Saldo actual']).replace(/[^0-9-]/g, '')) || 0;
                                    inventory[ref][size][res.name] = qty;
                                }
                            }
                        }
                    }
                });
            });

            allRefs = Array.from(tempRefs).sort((a, b) => a.localeCompare(b));
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('countInv').innerText = `${allRefs.length} refs`;
            
            setupAutocomplete('invRefInput', 'invRefList');
            setupAutocomplete('priRefInput', 'priRefList');
        }

        // --- SISTEMA DE AUTOCOMPLETE PERSONALIZADO (FIX PARA EL PROBLEMA "T") ---
        function setupAutocomplete(inputId, listId) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(listId);

            // Al escribir
            input.addEventListener('input', function() {
                const val = this.value.toUpperCase();
                closeAllLists();
                if (!val) return false;
                
                list.style.display = 'block';
                let count = 0;
                
                // Filtrar (Mostramos máximo 100 resultados para no colgar el navegador al escribir)
                for (let i = 0; i < allRefs.length; i++) {
                    if (allRefs[i].toUpperCase().includes(val)) {
                        const div = document.createElement("div");
                        // Resaltar coincidencia
                        const regex = new RegExp(`(${val})`, 'gi');
                        div.innerHTML = allRefs[i].replace(regex, "<strong>$1</strong>");
                        div.innerHTML += `<input type='hidden' value='${allRefs[i]}'>`;
                        
                        div.addEventListener("click", function(e) {
                            selectReference(this.getElementsByTagName("input")[0].value);
                            closeAllLists();
                        });
                        list.appendChild(div);
                        count++;
                        if(count > 100) break; // Límite de rendimiento
                    }
                }
            });

            // Al hacer clic en el input, mostrar lista completa (o top 500)
            input.addEventListener('click', function() {
                if(this.value === "") {
                    closeAllLists();
                    list.style.display = 'block';
                    // Mostrar primeras 500 referencias por defecto para scrollear
                    allRefs.slice(0, 500).forEach(ref => {
                        const div = document.createElement("div");
                        div.innerText = ref;
                        div.innerHTML += `<input type='hidden' value='${ref}'>`;
                        div.addEventListener("click", function() {
                            selectReference(this.getElementsByTagName("input")[0].value);
                            closeAllLists();
                        });
                        list.appendChild(div);
                    });
                }
            });
        }

        function selectReference(val) {
            document.getElementById('invRefInput').value = val;
            document.getElementById('priRefInput').value = val;
            updateSizes(val);
        }

        function closeAllLists(elmnt) {
            const x = document.getElementsByClassName("autocomplete-items");
            for (let i = 0; i < x.length; i++) {
                if (elmnt != x[i] && elmnt != document.getElementById('invRefInput') && elmnt != document.getElementById('priRefInput')) {
                    x[i].innerHTML = "";
                    x[i].style.display = "none";
                }
            }
        }
        
        // Cerrar lista si clic fuera
        document.addEventListener("click", function (e) {
            closeAllLists(e.target);
        });

        function updateSizes(ref) {
            const sel = document.getElementById('invSizeSelect');
            sel.innerHTML = '<option value="">Cargando tallas...</option>';
            
            if(inventory[ref]) {
                const sizes = Object.keys(inventory[ref]).sort();
                sel.innerHTML = '<option value="ALL">Todas las tallas</option>';
                sizes.forEach(s => {
                    sel.innerHTML += `<option value="${s}">${s}</option>`;
                });
            } else {
                sel.innerHTML = '<option value="">Sin inventario</option>';
            }
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            
            if(tabId === 'inventory') document.getElementById('btn-tab-inv').classList.add('active');
            else document.getElementById('btn-tab-pri').classList.add('active');
            
            document.getElementById(tabId).classList.add('active');
        }

        function clearAll() {
            document.getElementById('invRefInput').value = "";
            document.getElementById('priRefInput').value = "";
            document.getElementById('invSizeSelect').innerHTML = '<option value="">Selecciona producto...</option>';
            document.getElementById('inventoryResult').innerHTML = "";
            document.getElementById('priceResult').innerHTML = "";
            closeAllLists();
        }

        function searchStock() {
            const ref = document.getElementById('invRefInput').value;
            const size = document.getElementById('invSizeSelect').value;
            const container = document.getElementById('inventoryResult');

            if(!ref || !inventory[ref]) {
                container.innerHTML = "<div style='text-align:center; padding:20px; color:#d9534f; background:#fff0f0; border-radius:8px;'>⚠️ Producto no encontrado. Selecciona uno de la lista.</div>";
                return;
            }

            let html = `<table><thead><tr><th>Talla</th>${LOCATIONS.map(l=>`<th>${l}</th>`).join('')}</tr></thead><tbody>`;
            const sizes = (size === 'ALL' || size === "") ? Object.keys(inventory[ref]).sort() : [size];
            
            sizes.forEach(s => {
                html += `<tr><td style="font-weight:700">${s}</td>`;
                LOCATIONS.forEach(loc => {
                    const q = inventory[ref][s][loc];
                    html += `<td class="${q>0?'has-stock':'no-stock'}">${q>0?q:'-'}</td>`;
                });
                html += `</tr>`;
            });
            container.innerHTML = html + "</tbody></table>";
        }

        function searchPrice() {
            const ref = document.getElementById('priRefInput').value;
            const container = document.getElementById('priceResult');

            if(pricesMap[ref]) {
                container.innerHTML = `
                    <div class="price-card">
                        <div class="price-lbl">Precio de Venta Público</div>
                        <div class="price-val">${pricesMap[ref]}</div>
                        <div style="color:#999; font-size:0.8rem;">Ref: ${ref}</div>
                    </div>
                `;
            } else {
                if(inventory[ref]) {
                     container.innerHTML = `
                        <div class="price-card" style="border-color:#d4a373; background:#fffbf5;">
                            <div class="price-val" style="font-size:1.5rem; color:#666">Sin precio asignado</div>
                            <div style="color:#999; font-size:0.8rem;">El producto existe en inventario pero no tiene precio en la hoja maestra.</div>
                        </div>
                    `;
                } else {
                    container.innerHTML = "<div style='text-align:center; padding:20px; color:#d9534f;'>⚠️ Referencia no encontrada.</div>";
                }
            }
        }

        init();
    </script>
</body>
</html>
